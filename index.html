<!DOCTYPE html>
<html>

<head>
<title>AI Content Intelligence</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:600px;
margin:auto;
}

input{
padding:10px;
width:70%;
font-size:16px;
border-radius:5px;
border:none;
}

button{
padding:10px 15px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

ul{
text-align:left;
margin-top:20px;
}

li{
margin-bottom:10px;
background:#334155;
padding:10px;
border-radius:5px;
}

.score{
color:#22c55e;
font-weight:bold;
}

.copyBtn{
margin-left:10px;
background:#3b82f6;
}

.best{
color:#22c55e;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Content Intelligence</h1>

<input id="keyword" placeholder="Enter blog keyword">

<button onclick="generateTitles()">Generate</button>

<h3>Best SEO Title ⭐</h3>
<p id="bestTitle" class="best"></p>

<h3>Generated Titles</h3>
<ul id="titles"></ul>

<h3>Trending Topics</h3>
<ul id="trends"></ul>

</div>

<script>

function calculateScore(title,keyword){

let score=0;

if(title.toLowerCase().includes(keyword.toLowerCase()))
score+=30;

if(title.length>=50 && title.length<=60)
score+=20;

if(/[0-9]/.test(title))
score+=15;

if(title.includes("?"))
score+=10;

return score;

}

function copyText(text){

navigator.clipboard.writeText(text);

alert("Copied!");

}

async function generateTitles(){

const keyword=document.getElementById("keyword").value;

const response=await fetch("http://localhost:5000/generate-titles",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({keyword})
});

const data=await response.json();

document.getElementById("bestTitle").innerText=data.bestTitle;

const titleList=document.getElementById("titles");

titleList.innerHTML="";

data.titles.forEach(title=>{

const score=calculateScore(title,keyword);

const li=document.createElement("li");

li.innerHTML=`
${title}
<br>
<span class="score">SEO Score: ${score}</span>
<button class="copyBtn" onclick="copyText('${title}')">Copy</button>
`;

titleList.appendChild(li);

});


const trendResponse=await fetch(`http://localhost:5000/trends/${keyword}`);

const trendData=await trendResponse.json();

const trendList=document.getElementById("trends");

trendList.innerHTML="";

trendData.trends.forEach(trend=>{

const li=document.createElement("li");

li.innerText=trend;

trendList.appendChild(li);

});

}

</script>

</body>

</html>
