<!DOCTYPE html>
<html>

<head>

<title>AI Blog Title Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* Sidebar */

.sidebar{
width:250px;
background:#020617;
padding:25px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#22c55e;
margin-bottom:30px;
}

.menu div{
padding:12px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

.menu div:hover{
background:#1e293b;
}

/* Main */

.main{
flex:1;
padding:30px;
overflow:auto;
}

.header{
font-size:28px;
margin-bottom:20px;
}

/* Form */

.form{
background:#1e293b;
padding:20px;
border-radius:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
}

.generate{
grid-column:span 2;
background:#22c55e;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.generate:hover{
background:#16a34a;
}

/* Results */

.results{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:10px;
position:relative;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
padding:4px 8px;
font-size:12px;
border-radius:4px;
}

.bar{
height:6px;
background:#334155;
border-radius:5px;
margin-top:6px;
}

.fill{
height:6px;
background:#22c55e;
border-radius:5px;
}

.copy{
margin-top:12px;
background:#3b82f6;
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">AI Writer</div>

<div class="menu">

<div onclick="showDashboard()">Dashboard</div>
<div onclick="showGenerator()">Title Generator</div>
<div onclick="showOutline()">Blog Outline</div>
<div onclick="showAnalytics()">Analytics</div>

</div>

</div>


<div class="main">

<div class="header">AI Blog Title Generator</div>

<div class="form">

<input id="topic" placeholder="Blog Topic">

<select id="audience">
<option>Students</option>
<option>Developers</option>
<option>Entrepreneurs</option>
<option>Bloggers</option>
</select>

<input id="keyword" placeholder="Trending Keyword">

<select id="count">
<option value="5">5 Titles</option>
<option value="10">10 Titles</option>
<option value="15">15 Titles</option>
</select>

<button class="generate" onclick="generate()">Generate Titles</button>

</div>

<div id="results" class="results"></div>

</div>


<script>

/* TITLE GENERATION */

async function generate(){

const topic=document.getElementById("topic").value
const audience=document.getElementById("audience").value
const keyword=document.getElementById("keyword").value
const count=document.getElementById("count").value

const response=await fetch("http://localhost:5000/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
topic,
audience,
keyword,
count
})

})

const data=await response.json()

let html=""

data.titles.forEach(item=>{

html+=`

<div class="card">

<div class="badge">AI</div>

<strong>${item.title}</strong>

<div>SEO Score: ${item.seo}/100</div>

<div class="bar">
<div class="fill" style="width:${item.seo}%"></div>
</div>

<button class="copy" onclick="copyText(this)">Copy</button>

</div>

`

})

document.getElementById("results").innerHTML=html

}

/* BLOG OUTLINE */

async function showOutline(){

const topic=document.getElementById("topic").value

const response=await fetch("http://localhost:5000/outline",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({topic})

})

const data=await response.json()

let html="<h2>Blog Outline</h2>"

data.outline.forEach(p=>{
html+=`<p>• ${p}</p>`
})

document.getElementById("results").innerHTML=html

}

/* SEO ANALYTICS */

async function showAnalytics(){

const response=await fetch("http://localhost:5000/analytics")

const data=await response.json()

let html="<h2>SEO Tips</h2>"

data.tips.forEach(t=>{
html+=`<p>• ${t}</p>`
})

document.getElementById("results").innerHTML=html

}

function showDashboard(){

document.getElementById("results").innerHTML = `
<h2>Welcome</h2>
<p>This AI tool generates blog titles using emotional triggers, curiosity gaps and SEO patterns.</p>
`

}

function showGenerator(){

document.getElementById("results").innerHTML=""

}

function copyText(btn){

const text=btn.parentElement.querySelector("strong").innerText

navigator.clipboard.writeText(text)

btn.innerText="Copied"

setTimeout(()=>{
btn.innerText="Copy"
},2000)

}

</script>

</body>

</html>
