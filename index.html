<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Blog Title Generator</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#6d28d9,#0f172a);
color:white;
}

.container{
width:500px;
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:8px;
background:#8b5cf6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#7c3aed;
}

#results{
margin-top:20px;
}

.title-card{
background:rgba(255,255,255,0.15);
padding:12px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.copy-btn{
background:#22c55e;
padding:6px 10px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Blog Title Generator</h1>

<input id="topic" placeholder="Enter blog topic">

<select id="mode">
<option>SEO Optimized</option>
<option>Viral</option>
<option>Clickbait</option>
<option>Professional</option>
<option>YouTube</option>
</select>

<button onclick="generateTitles()">Generate Titles</button>

<div id="results"></div>

</div>

<script>

function generateTitles(){

const topic=document.getElementById("topic").value
const results=document.getElementById("results")

if(topic===""){
alert("Enter a topic")
return
}

const titles=[
`10 Amazing ${topic} Ideas You Need to Know`,
`Top ${topic} Trends in 2026`,
`The Ultimate Guide to ${topic}`,
`Why ${topic} is the Future`,
`Beginner's Guide to ${topic}`
]

results.innerHTML=""

titles.forEach(title=>{

const div=document.createElement("div")
div.className="title-card"

div.innerHTML=`
<span>${title}</span>
<button class="copy-btn" onclick="copyTitle('${title}')">Copy</button>
`

results.appendChild(div)

})

}

function copyTitle(text){
navigator.clipboard.writeText(text)
alert("Copied!")
}

</script>

</body>
</html>
